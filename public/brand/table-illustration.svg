
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240" fill="none">
  
  <rect x="60" y="80" width="480" height="100" fill="#171B24" stroke="#2A3040" stroke-width="1.5"></rect>
  
